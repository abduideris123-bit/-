// Load custom cats from localStorage or use defaults
function loadCats(u){
  try{
    var raw=localStorage.getItem('grb_cats_'+(u||'default'));
    return raw?JSON.parse(raw):DEFAULT_CATS;
  }catch(e){return DEFAULT_CATS;}
}
function saveCats(u,cats){
  try{localStorage.setItem('grb_cats_'+(u||'default'),JSON.stringify(cats));}catch(e){}
}
var CATS=DEFAULT_CATS.slice();
const JSONBIN_KEY='$2a$10$3U57/6sgbv2X6yocg0W9TeLCX.NxhApiDRObUILaN8qD3N4WMZgua';
const TG_DEFAULT_TOKEN='8814244753:AAH23Bhs5giTUAgAFo9PrAWNhgkD5x-4t-s';
const TG_DEFAULT_CHAT='1060051687';
let TG_TOKEN=localStorage.getItem('grb_tg_token')||TG_DEFAULT_TOKEN;
let TG_CHAT=localStorage.getItem('grb_tg_chat')||TG_DEFAULT_CHAT;
function tgApi(){ return 'https://api.telegram.org/bot'+TG_TOKEN; }
function saveTgConfig(token,chat){

// ── Telegram backup ────────────────────────────────────────────────────
async function tgSaveBackup(user, data){
  if(!user) return; // no backup without login
  try{
    var json=JSON.stringify(data);
    var blob=new Blob([json],{type:'application/json'});
    var fname='grb_backup_'+user.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.json';
    var form=new FormData();
    form.append('chat_id', TG_CHAT);
    form.append('document', blob, fname);
    form.append('caption', '🌱 ግብርና ሱቅ backup\n📅 '+new Date().toLocaleString()+'\n👤 '+user);
    var r=await fetch(tgApi()+'/sendDocument', {method:'POST', body:form});
    var j=await r.json();
    return !!j.ok;
  } catch(e){ console.log('TG save error',e); return false; }
}

async function tgLoadLatest(){
  try{
    // get latest file from bot
    var resp=await fetch(tgApi()+'/getUpdates?limit=50&offset=-50');
    var json=await resp.json();
    if(!json.ok||!json.result) return null;
    // find latest document message
    var msgs=json.result.filter(u=>u.message&&u.message.document&&u.message.document.file_name&&u.message.document.file_name.startsWith('grb_backup_'));
    if(msgs.length===0) return null;
    // get latest
    var latest=msgs[msgs.length-1];
    var fileId=latest.message.document.file_id;
    // get file path
    var fr=await fetch(tgApi()+'/getFile?file_id='+fileId);
    var fj=await fr.json();
    if(!fj.ok) return null;
    var filePath=fj.result.file_path;
    // download file
    var dr=await fetch('https://api.telegram.org/file/bot'+TG_TOKEN+'/'+filePath);
    var text=await dr.text();
    return JSON.parse(text);
  } catch(e){ console.log('TG load error',e); return null; }
}

function resetAllData(){
  var ps=[],ss=[],tr=[];
  saveData(S.user,ps,ss,tr,S.cats);

  showToast('🗑️ ሁሉም ውሂብ ተሰርዟል');

const JSONBIN_URL='https://api.jsonbin.io/v3/b';
const SKEY=u=>u?'grb_'+u.replace(/\s/g,'_').toLowerCase():'grb_default';
const BINKEY=u=>'grb_binid_'+u.replace(/\s/g,'_').toLowerCase();

// ── Import from local JSON file ─────────────────────────────────────────
function importFromFile(file){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.products||!Array.isArray(data.products)){
        showToast('❌ ፋይሉ ትክክለኛ backup አይደለም');return;
      }
      var ps=data.products||[];
      var ss=data.sales||[];
      var tr=data.trash||[];
      var cats=data.cats||[...DEFAULT_CATS];
      CATS=cats;
      saveCats(S.user,CATS);
      saveData(S.user,ps,ss,tr,cats);
      set({products:ps,sales:ss,trash:tr,cats:cats});
      showToast('✅ '+ps.length+' ዕቃ · '+ss.length+' ሽያጭ ተጫነ!');
    }catch(err){
      showToast('❌ ፋይሉን ማንበብ አልተቻለም');
    }
  };
  reader.readAsText(file);
}

// ── Cloud sync ──────────────────────────────────────────────────────────
async function cloudSave(user,data){
  if(!user){set({syncStatus:'ok'});return;} // no cloud without login
  try{
    set({syncStatus:'syncing'});
    var binId=localStorage.getItem(BINKEY(user));
    var body=JSON.stringify({record:data});
    var resp,json;
    if(binId){
      // update existing bin
      resp=await fetch(JSONBIN_URL+'/'+binId,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
        body:body
      });
    } else {
      // create new bin
      resp=await fetch(JSONBIN_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':SKEY(user),'X-Bin-Private':'false'},
        body:body
      });
      json=await resp.json();
      if(json.metadata&&json.metadata.id){
        localStorage.setItem(BINKEY(user),json.metadata.id);
      }
    }
    set({syncStatus:'ok'});
  } catch(e){
    set({syncStatus:'error'});
  }
}

async function cloudLoad(user){
  try{
    set({syncStatus:'syncing'});
    var binId=localStorage.getItem(BINKEY(user));
    if(!binId){
      // search by name

function compressImage(file,maxW,maxH,quality,cb){
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW||h>maxH){
        var ratio=Math.min(maxW/w,maxH/h);
        w=Math.round(w*ratio);h=Math.round(h*ratio);
      }
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=function(){showToast('⚠️ ፎቶ መጫን አልተቻለም');};
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function matchPlantProblem(query){
  var q=(query||'').toLowerCase();
  var scored=PLANT_KB.map(function(e){
    var score=e.kw.reduce(function(s,k){return s+(q.indexOf(k.toLowerCase())>-1?1:0);},0);
    return {entry:e,score:score};
  }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;});
  return scored.slice(0,2).map(function(x){return x.entry;});
}

function speakAIResult(){
  if(!('speechSynthesis' in window)){showToast('⚠️ ይህ መሳሪያ ድምጽ ማንበብን አይደግፍም');return;}
  if(S.aiSpeaking){
    window.speechSynthesis.cancel();
    set({aiSpeaking:false});
    return;
  }
  if(!S.aiResult) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(S.aiResult);
  u.lang='am-ET';
  u.rate=0.95;
  var voices=window.speechSynthesis.getVoices();
  var amVoice=voices.find(function(v){return v.lang&&v.lang.toLowerCase().indexOf('am')===0;});
  if(amVoice) u.voice=amVoice;
  u.onend=function(){set({aiSpeaking:false});};
  u.onerror=function(){set({aiSpeaking:false});};
  window.speechSynthesis.speak(u);
  set({aiSpeaking:true});
}

function expStatus(expDate){
  if(!expDate) return null;
  const now=new Date(); const exp=new Date(expDate);
  const diffDays=Math.ceil((exp-now)/(1000*60*60*24));
  if(diffDays<0) return {status:'expired',label:'ጊዜ አልፎበታል!',days:diffDays};
  if(diffDays<=30) return {status:'soon',label:diffDays+' ቀን ይቀረዋል',days:diffDays};
  return {status:'ok',label:diffDays+' ቀን ይቀረዋል',days:diffDays};
}

  if(!ok){set({loginErr:'ትክክለኛ ስልክ ቁጥር ወይም Email አስገቡ'});return;}

function sendNotif(title, body){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){
    new Notification(title,{body:body,icon:''});
  } else if(Notification.permission!=='denied'){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted') new Notification(title,{body:body,icon:''});
    });
  }
}

function checkExpNotifications(prods){
  var thresh=S.lowThreshold||10;
  // expiry alerts
  var expiring=prods.filter(function(p){var s=expStatus(p.expDate);return s&&(s.status==='expired'||s.status==='soon');});
  expiring.forEach(function(p){
    var s=expStatus(p.expDate);
    sendNotif('🌱 ግብርና ሱቅ — '+p.name, s.label);
  });
  // low stock alerts
  var low=prods.filter(function(p){return p.quantity<=thresh;});
  if(low.length>0){
    var names=low.slice(0,3).map(function(p){return p.name+'('+p.quantity+')';}).join(', ');
    if(low.length>3) names+=(' +'+( low.length-3)+' ዕቃ');
    sendNotif('⚠️ ዝቅተኛ ክምችት — '+low.length+' ዕቃ', names);
  }
}

function checkLowStock(){
  var thresh=S.lowThreshold||10;
  var low=S.products.filter(function(p){return p.quantity<=thresh;});
  if(low.length>0){
    if(Notification.permission==='granted'){
      var names=low.slice(0,3).map(function(p){return p.name+': '+p.quantity+' '+p.unit;}).join('\n');
      if(low.length>3) names+='\n+'+(low.length-3)+' ተጨማሪ';
      sendNotif('⚠️ ዝቅተኛ ክምችት ('+low.length+' ዕቃ)', names);
    } else {
      Notification.requestPermission().then(function(perm){
        if(perm==='granted') checkLowStock();
      });
    }
    set({showLowAlert:true});
  } else {
    showToast('✅ ሁሉም ዕቃ ተቀናጅቷል — ዝቅተኛ ክምችት የለም');
  }
}

function saveSale(){
  const f=S.sF;
  const prod=S.products.find(p=>p.id===f.productId);
  if(!prod||!f.qty||+f.qty<=0){showToast('⚠️ ዕቃ እና ብዛት ምረጡ');return;}
  let ss,ps;
  if(S.editS){
    // editing existing sale — restore old qty first
    const old=S.sales.find(s=>s.id===S.editS);
    const oldProd=S.products.find(p=>p.id===old.productId);
    // restore old qty
    ps=S.products.map(p=>{
      if(p.id===old.productId) return {...p,quantity:p.quantity+old.qty};
      return p;
    });
    // check new qty
    const newProd=ps.find(p=>p.id===f.productId);
    if(+f.qty>newProd.quantity){showToast('⚠️ ያለው ክምችት: '+newProd.quantity+' '+newProd.unit);return;}
    const total=+f.qty*newProd.sellPrice;
    ss=S.sales.map(s=>s.id===S.editS?{...s,productId:newProd.id,productName:newProd.name,qty:+f.qty,price:newProd.sellPrice,total,date:f.date}:s);
    ps=ps.map(p=>p.id===f.productId?{...p,quantity:p.quantity-+f.qty}:p);
  } else {
    if(+f.qty>prod.quantity){showToast('⚠️ ያለው ክምችት: '+prod.quantity+' '+prod.unit);return;}
    const total=+f.qty*prod.sellPrice;
    ss=[...S.sales,{id:uid(),productId:prod.id,productName:prod.name,qty:+f.qty,price:prod.sellPrice,total,date:f.date}];
    ps=S.products.map(p=>p.id===prod.id?{...p,quantity:p.quantity-+f.qty}:p);
  }
  saveData(S.user,ps,ss,S.trash,S.cats);
  cloudSave(S.user,{products:ps,sales:ss,trash:S.trash,cats:S.cats});
  tgSaveBackup(S.user,{products:ps,sales:ss,trash:S.trash,cats:S.cats});
  set({sales:ss,products:ps,showSForm:false,editS:null,sF:{productId:'',qty:'',date:today()}});
  showToast('✅ ሽያጭ ተቀምጧል');
}
function delSale(id){
  const s=S.sales.find(x=>x.id===id);
  if(!s) return;
  // restore qty
  const ps=S.products.map(p=>p.id===s.productId?{...p,quantity:p.quantity+s.qty}:p);

function D(){
  const p=S.products,s=S.sales;
  const inv=p.reduce((a,x)=>a+x.quantity*x.buyPrice,0);
  const rev=s.reduce((a,x)=>a+x.total,0);
  const prof=s.reduce((a,x)=>{const pr=p.find(r=>r.id===x.productId);return a+(pr?(x.price-pr.buyPrice)*x.qty:0);},0);
  const low=p.filter(x=>x.quantity<=(S.lowThreshold||10));
  const expAlert=p.filter(x=>{const es=expStatus(x.expDate);return es&&(es.status==='expired'||es.status==='soon');});
  return{inv,rev,prof,low,expAlert};
}

// ── Perf: debounce helper (batches rapid input events into one render) ────
function debounce(fn,ms){
  var t;
  return function(){
    var args=arguments,ctx=this;
    clearTimeout(t);
    t=setTimeout(function(){fn.apply(ctx,args);},ms);
  };
}
// ── Perf: preserve focus + caret across full innerHTML re-renders ─────────
// (every set()/render() rebuilds the whole page as a string; without this,
// typing in any input causes the cursor to jump to the end after each
// keystroke, which is what makes the app feel slow while typing)
function captureFocus(app){
  var el=document.activeElement;
  if(!el||!el.id||!app.contains(el)) return null;
  var info={id:el.id,type:el.type};
  try{
    if(typeof el.selectionStart==='number'){info.start=el.selectionStart;info.end=el.selectionEnd;}
  }catch(e){/* type=number/date/etc. don't support selection — leave start/end unset */}
  return info;
}
function restoreFocus(info){
  if(!info) return;
  var el=document.getElementById(info.id);
  if(!el) return;
  el.focus();
  if(typeof info.start==='number'){
    try{el.setSelectionRange(info.start,info.end);return;}catch(e){}
  }
  // number/date inputs: selection isn't directly settable, and a freshly
  // re-created element defaults the caret to position 0, not the end —
  // switch to text briefly to push the caret to the end, then switch back
  if(info.type==='number'||info.type==='date'){
    try{
      var len=(el.value||'').length,orig=el.type;
      el.type='text';
      el.setSelectionRange(len,len);
      el.type=orig;
    }catch(e){}
  }
}

function rReport(d){
  // ── per-day sales for last 7 days chart ──
  var days=[];
  for(var i=6;i>=0;i--){
    var dt=new Date(); dt.setDate(dt.getDate()-i);
    var ds=dt.toISOString().slice(0,10);
    var label=['እሑ','ሰኞ','ማ','ረቡ','ሐሙ','ዓር','ቅዳ'][dt.getDay()];
    var rev=S.sales.filter(function(s){return s.date===ds;}).reduce(function(a,s){return a+s.total;},0);
    days.push({label:label,date:ds,rev:rev});
  }
  var maxRev=Math.max.apply(null,days.map(function(x){return x.rev;}))||1;

  // ── per-cat revenue ──
  var catData=getCats().map(function(ct){
    var ps=S.products.filter(function(p){return p.category===ct.id;});
    var rev=S.sales.filter(function(s){return ps.find(function(p){return p.id===s.productId;});}).reduce(function(a,s){return a+s.total;},0);
    var cost=S.sales.filter(function(s){var pr=ps.find(function(p){return p.id===s.productId;});return !!pr;}).reduce(function(a,s){var pr=ps.find(function(p){return p.id===s.productId;});return a+(pr?(s.price-pr.buyPrice)*s.qty:0);},0);
    return{ct:ct,ps:ps,rev:rev,cost:cost};
  }).filter(function(x){return x.rev>0;});
  var maxCatRev=Math.max.apply(null,catData.map(function(x){return x.rev;}))||1;

  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html+='<div style="font-size:15px;font-weight:800">📊 ሪፖርት</div>';
  html+='<button class="btn p" id="pdf-export-btn" style="font-size:12px;padding:7px 12px">📄 PDF Export</button>';
  html+='</div>';

  // ── summary cards row ──
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  var cards=[
    {l:'ጠቅላላ ሽያጭ',v:ETB(d.rev),c:'#16A34A',bg:'#F0FDF4'},
    {l:'ትርፍ',v:ETB(d.prof),c:d.prof>=0?'#16A34A':'#EF4444',bg:d.prof>=0?'#F0FDF4':'#FFF5F5'},
    {l:'የዕቃ ዋጋ',v:ETB(d.inv),c:'#1D4ED8',bg:'#EFF6FF'},
    {l:'ሽያጭ ብዛት',v:S.sales.length+' ጊዜ',c:'#9333EA',bg:'#FAF5FF'},
  ];
  cards.forEach(function(card){
    html+='<div style="background:'+card.bg+';border-radius:12px;padding:12px 14px">';
    html+='<div style="font-size:10px;color:#6B7280;margin-bottom:4px">'+card.l+'</div>';
    html+='<div style="font-size:16px;font-weight:800;color:'+card.c+'">'+card.v+'</div>';
    html+='</div>';
  });
  html+='</div>';

  // ── 7-day bar chart ──
  html+='<div class="card" style="margin-bottom:10px">';
  html+='<div class="st" style="margin-bottom:12px">📈 የ7 ቀን ሽያጭ</div>';
  html+='<div style="display:flex;align-items:flex-end;gap:6px;height:90px;padding:0 4px">';
  days.forEach(function(day){
    var h=maxRev>0?Math.round((day.rev/maxRev)*80):0;
    var today2=new Date().toISOString().slice(0,10);

  var top5=Object.keys(topProds).sort(function(a,b){return topProds[b]-topProds[a];}).slice(0,5).map(function(id){
    var p=S.products.find(function(x){return x.id===id;});

    html+='</div>';
  }

  return html;
}

function rProfit(){
  var d=D();
  var exps=S.expenses||[];
  var totalExp=exps.reduce(function(a,e){return a+e.amount;},0);
  var netProfit=d.prof-totalExp;
  var grossMargin=d.rev>0?Math.round((d.prof/d.rev)*100):0;
  var netMargin=d.rev>0?Math.round((netProfit/d.rev)*100):0;

  // monthly breakdown (last 6 months)
  var months=[];
  for(var i=5;i>=0;i--){
    var dt=new Date();dt.setMonth(dt.getMonth()-i);
    var ym=dt.toISOString().slice(0,7);
    var mLabel=['ጥር','የካ','መጋ','ሚያ','ግን','ሐም','ሐም','ነሃ','መስ','ጥቅ','ህዳ','ታህ'][dt.getMonth()];
    var mRev=S.sales.filter(function(s){return s.date&&s.date.slice(0,7)===ym;}).reduce(function(a,s){return a+s.total;},0);
    var mProf=S.sales.filter(function(s){return s.date&&s.date.slice(0,7)===ym;}).reduce(function(a,s){var pr=S.products.find(function(p){return p.id===s.productId;});return a+(pr?(s.price-pr.buyPrice)*s.qty:0);},0);
    var mExp=exps.filter(function(e){return e.date&&e.date.slice(0,7)===ym;}).reduce(function(a,e){return a+e.amount;},0);
    months.push({label:mLabel,ym:ym,rev:mRev,prof:mProf,exp:mExp,net:mProf-mExp});

  // drag-drop reorder
  (function(){
    var grid=document.getElementById('cat-grid-container');
    if(!grid) return;
    var dragIdx=null;
    grid.querySelectorAll('[data-cat-idx]').forEach(function(el){
      el.addEventListener('dragstart',function(){dragIdx=+el.dataset.catIdx;el.classList.add('dragging');});
      el.addEventListener('dragend',function(){el.classList.remove('dragging');grid.querySelectorAll('[data-cat-idx]').forEach(function(x){x.classList.remove('drag-over');});});
      el.addEventListener('dragover',function(e){e.preventDefault();el.classList.add('drag-over');});
      el.addEventListener('dragleave',function(){el.classList.remove('drag-over');});
      el.addEventListener('drop',function(e){
        e.preventDefault();el.classList.remove('drag-over');
        var toIdx=+el.dataset.catIdx;
        if(dragIdx===null||dragIdx===toIdx) return;
        var cats=getCats().slice();
        var moved=cats.splice(dragIdx,1)[0];

// ── Install prompt ───────────────────────────────────────────────────────
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  showInstallBar();
});
window.addEventListener('appinstalled',function(){
  hideInstallBar();
  deferredPrompt=null;
  showToast('✅ አፑ ተጭኗል!');
});
function showInstallBar(){
  var bar=document.getElementById('install-bar');
  if(bar) bar.style.display='flex';
}
function hideInstallBar(){
  var bar=document.getElementById('install-bar');
  if(bar) bar.style.display='none';
}
function triggerInstall(){
  if(!deferredPrompt){
    showToast('📱 Browser ⋮ → "Add to Home Screen" ተጫን');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted') showToast('✅ አፑ እየተጫነ ነው!');
    deferredPrompt=null;
    hideInstallBar();
  });
}

function exportPDF(){
  var d=D();

  var catRows=getCats().map(function(ct){
    var ps=S.products.filter(function(p){return p.category===ct.id;});
    var rev=S.sales.filter(function(s){return ps.find(function(p){return p.id===s.productId;});}).reduce(function(a,s){return a+s.total;},0);
    var prof=S.sales.filter(function(s){var pr=ps.find(function(p){return p.id===s.productId;});return !!pr;}).reduce(function(a,s){var pr=ps.find(function(p){return p.id===s.productId;});return a+(pr?(s.price-pr.buyPrice)*s.qty:0);},0);
    return '<tr><td>'+ct.icon+' '+ct.name+'</td><td>'+ps.length+'</td><td>'+ETB(rev)+'</td><td style="color:'+(prof>=0?'green':'red')+'">'+ETB(prof)+'</td></tr>';
  }).join('');
  var top=Object.keys(S.sales.reduce(function(acc,s){acc[s.productId]=(acc[s.productId]||0)+s.total;return acc;},{})).sort(function(a,b){return (S.sales.filter(function(x){return x.productId===b;}).reduce(function(a,s){return a+s.total;},0))-(S.sales.filter(function(x){return x.productId===a;}).reduce(function(a,s){return a+s.total;},0));}).slice(0,5).map(function(id,i){

    'body{font-family:Arial,sans-serif;padding:20px;color:#111}'+

    '.scard .lbl{font-size:11px;color:#6B7280}.scard .val{font-size:18px;font-weight:bold;color:#16A34A}'+
    'table{width:100%;border-collapse:collapse;margin-top:8px}'+
    'th{background:#16A34A;color:white;padding:8px;text-align:left;font-size:12px}'+
    'td{padding:7px 8px;border-bottom:1px solid #E5E7EB;font-size:12px}'+
    'tr:nth-child(even){background:#F9FAFB}'+
    '.footer{margin-top:30px;font-size:10px;color:#9CA3AF;text-align:center}'+
    '</style></head><body>'+
    '<h1>🌱 ግብርና ሱቅ — ሪፖርት</h1>'+
    '<p style="color:#6B7280;font-size:12px">ቀን: '+now+' · ተጠቃሚ: '+(S.user||'')+'</p>'+
    '<div class="summary">'+
    '<div class="scard"><div class="lbl">ጠቅላላ ሽያጭ</div><div class="val">'+ETB(d.rev)+'</div></div>'+
    '<div class="scard"><div class="lbl">ትርፍ</div><div class="val" style="color:'+(d.prof>=0?'#16A34A':'#EF4444')+'">'+ETB(d.prof)+'</div></div>'+
    '<div class="scard"><div class="lbl">ሽያጭ ብዛት</div><div class="val">'+S.sales.length+'</div></div>'+
    '</div>'+
    '<h2>📦 በምድብ</h2>'+
    '<table><tr><th>ምድብ</th><th>ዕቃ</th><th>ሽያጭ</th><th>ትርፍ</th></tr>'+catRows+'</table>'+
    (top?'<h2>🏆 ምርጥ 5 ዕቃ</h2><table><tr><th>#</th><th>ዕቃ</th><th>ሽያጭ</th></tr>'+top+'</table>':'')+
    '<div class="footer">ሪፖርት በ ግብርና ሱቅ ተዘጋጅቷል</div>'+
    '</body></html>';
  var w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},400);}

ctx.textBaseline='middle';
ctx.fillText('🌱',256,270);
