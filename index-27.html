.photo-search-btn:active{background:#DCFCE7;}

.cam-bg{position:fixed;inset:0;background:#000000cc;z-index:300;display:flex;align-items:flex-end;justify-content:center;}

<body>
<div id="app"></div>
<script>
const CATS=[
  {id:'kimikali',name:'ኬሚካል',icon:'🧪',color:'#7C3AED',bg:'#F5F3FF'},
  {id:'madaberiya',name:'ማዳበሪያ',icon:'🌾',color:'#CA8A04',bg:'#FEF9C3'},
  {id:'arem',name:'የአረም ማጥፊያ',icon:'🌿',color:'#16A34A',bg:'#DCFCE7'},
  {id:'til',name:'የትል መድሃኒት',icon:'🐛',color:'#DC2626',bg:'#FEF2F2'},
  {id:'bereero',name:'የበረሮ/ተባይ',icon:'🪲',color:'#EA580C',bg:'#FFF7ED'},
  {id:'zer',name:'ዘሮች',icon:'🌱',color:'#059669',bg:'#ECFDF5'},
  {id:'messa',name:'መሳሪያ/መስኖ',icon:'🚿',color:'#0284C7',bg:'#F0F9FF'},
  {id:'other',name:'ሌሎች',icon:'📦',color:'#6B7280',bg:'#F9FAFB'},
];
const SKEY=u=>'grb_'+u.replace(/\s/g,'_').toLowerCase();
function loadData(u){try{const r=localStorage.getItem(SKEY(u));return r?JSON.parse(r):null;}catch(e){return null;}}
function saveData(u,p,s,t,un){try{localStorage.setItem(SKEY(u),JSON.stringify({products:p,sales:s,trash:t||[],usageNotes:un||{}}));}catch(e){}}
const DEMO={
  products:[
    {id:'p1',name:'ራውንድ አፕ',category:'arem',quantity:50,buyPrice:380,sellPrice:550,unit:'ሊ',expDate:'2027-03-01'},
    {id:'p2',name:'ግራሞክሶን',category:'arem',quantity:30,buyPrice:420,sellPrice:600,unit:'ሊ',expDate:'2026-08-15'},
    {id:'p3',name:'ኮንፊዶር',category:'kimikali',quantity:40,buyPrice:250,sellPrice:380,unit:'ሊ',expDate:'2026-06-10'},
    {id:'p4',name:'ዳይሜቶኤት',category:'til',quantity:25,buyPrice:300,sellPrice:450,unit:'ሊ',expDate:'2026-12-01'},
    {id:'p5',name:'ሳይፐርሜትሪን',category:'bereero',quantity:35,buyPrice:200,sellPrice:320,unit:'ሊ',expDate:'2027-01-20'},
    {id:'p6',name:'ዩሪያ ማዳበሪያ',category:'madaberiya',quantity:120,buyPrice:1800,sellPrice:2200,unit:'ከረጢት',expDate:''},
    {id:'p7',name:'DAP ማዳበሪያ',category:'madaberiya',quantity:80,buyPrice:2200,sellPrice:2700,unit:'ከረጢት',expDate:''},
    {id:'p8',name:'የበቆሎ ዘር BH-540',category:'zer',quantity:60,buyPrice:450,sellPrice:650,unit:'ኪ.ግ',expDate:'2026-09-01'},
    {id:'p9',name:'የስንዴ ዘር',category:'zer',quantity:90,buyPrice:280,sellPrice:420,unit:'ኪ.ግ',expDate:'2026-07-01'},
    {id:'p10',name:'ድሪፕ ቱቦ',category:'messa',quantity:10,buyPrice:3500,sellPrice:5000,unit:'ጥቅል',expDate:''},
  ],
  sales:[
    {id:'s1',productId:'p6',productName:'ዩሪያ ማዳበሪያ',qty:5,price:2200,total:11000,date:'2026-05-06'},
    {id:'s2',productId:'p1',productName:'ራውንድ አፕ',qty:8,price:550,total:4400,date:'2026-05-07'},
    {id:'s3',productId:'p8',productName:'የበቆሎ ዘር BH-540',qty:10,price:650,total:6500,date:'2026-05-08'},
  ]
};
const ETB=n=>Number(n||0).toLocaleString()+' ብር';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const getCat=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];

// Exp date helpers
function expStatus(expDate){
  if(!expDate) return null;
  const now=new Date(); const exp=new Date(expDate);
  const diffDays=Math.ceil((exp-now)/(1000*60*60*24));
  if(diffDays<0) return {status:'expired',label:'ጊዜ አልፎበታል!',days:diffDays};
  if(diffDays<=30) return {status:'soon',label:diffDays+' ቀን ይቀረዋል',days:diffDays};
  return {status:'ok',label:diffDays+' ቀን ይቀረዋል',days:diffDays};
}

let S={
  user:null,products:[],sales:[],trash:[],tab:'dash',
  selCat:null,
  showPForm:false,editP:null,
  pF:{name:'',category:'arem',quantity:'',buyPrice:'',sellPrice:'',unit:'ሊ',expDate:''},
  showSForm:false,editS:null,
  sF:{productId:'',qty:'',date:today(),discount:''},
  confDel:null,confDelSale:null,
  pSearch:'',sSearch:'',
  loginVal:'',loginErr:'',
  toast:null,toastTimer:null,
  usageNotes:{},
  showCam:false,camResult:null,camSearching:false,
  editUsageId:null,
};

function set(patch){
  Object.assign(S,patch);
  if(patch.user!==undefined){patch.user?localStorage.setItem('grb_session',patch.user):localStorage.removeItem('grb_session');}
  render();
}
function showToast(msg){if(S.toastTimer)clearTimeout(S.toastTimer);const t=setTimeout(()=>set({toast:null,toastTimer:null}),2500);set({toast:msg,toastTimer:t});}

// ── Actions ──────────────────────────────────────────────────────────────
function login(){
  const v=S.loginVal.trim();
  if(!v){set({loginErr:'ስልክ ቁጥር ወይም Email አስገቡ'});return;}
  const ok=/^[0-9+]{7,15}$/.test(v.replace(/\s/g,''))||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  if(!ok){set({loginErr:'ትክክለኛ ስልክ ቁጥር ወይም Email አስገቡ'});return;}
  const d=loadData(v);
  set({user:v,products:d?d.products:DEMO.products,sales:d?d.sales:DEMO.sales,trash:d?d.trash||[]:[], usageNotes:d?d.usageNotes||{}:{}});
  checkExpNotifications(d?d.products:DEMO.products);
}
function logout(){set({user:null,products:[],sales:[],trash:[],tab:'dash',selCat:null,loginVal:'',loginErr:''});}

function checkExpNotifications(prods){
  if(!('Notification' in window)) return;
  const expiring=prods.filter(p=>{const s=expStatus(p.expDate);return s&&(s.status==='expired'||s.status==='soon');});
  if(expiring.length===0) return;
  if(Notification.permission==='granted'){
    expiring.forEach(p=>{
      const s=expStatus(p.expDate);
      new Notification('🌱 ግብርና ሱቅ — '+p.name,{body:s.label,icon:''});
    });
  } else if(Notification.permission!=='denied'){
    Notification.requestPermission().then(perm=>{
      if(perm==='granted') expiring.forEach(p=>{const s=expStatus(p.expDate);new Notification('🌱 '+p.name,{body:s.label});});
    });
  }
}

function saveProd(){
  const f=S.pF;
  if(!f.name||!f.quantity||!f.sellPrice){showToast('⚠️ ስም፣ ብዛት፣ ዋጋ ያስፈልጋል');return;}
  let ps;
  if(S.editP) ps=S.products.map(p=>p.id===S.editP.id?{...p,...f,quantity:+f.quantity,buyPrice:+f.buyPrice,sellPrice:+f.sellPrice}:p);
  else ps=[...S.products,{id:uid(),...f,quantity:+f.quantity,buyPrice:+f.buyPrice,sellPrice:+f.sellPrice}];
  saveData(S.user,ps,S.sales,S.trash,S.usageNotes);
  set({products:ps,showPForm:false,editP:null});
  showToast('✅ ዕቃ ተቀምጧል');
}
function delProd(id){
  const p=S.products.find(x=>x.id===id);
  if(!p) return;
  const ps=S.products.filter(x=>x.id!==id);
  const tr=[...S.trash,{...p,deletedAt:today()}];
  saveData(S.user,ps,S.sales,tr,S.usageNotes);
  set({products:ps,trash:tr,confDel:null});
  showToast('🗑️ ወደ ታሪክ ተወሰደ');
}
function restoreProd(id){
  const p=S.trash.find(x=>x.id===id);
  if(!p) return;
  const {deletedAt,...prod}=p;
  const tr=S.trash.filter(x=>x.id!==id);
  const ps=[...S.products,prod];
  saveData(S.user,ps,S.sales,tr,S.usageNotes);
  set({products:ps,trash:tr});
  showToast('✅ ዕቃ ተመልሷል!');
}
function permDel(id){
  const tr=S.trash.filter(x=>x.id!==id);
  saveData(S.user,S.products,S.sales,tr,S.usageNotes);
  set({trash:tr});
  showToast('🗑️ ሙሉ ተሰርዟል');
}

function saveUsageNote(productId,note){
  const un={...S.usageNotes,[productId]:note};
  saveData(S.user,S.products,S.sales,S.trash,un);
  set({usageNotes:un});
  showToast('✅ አጠቃቀም ተቀምጧል');
}

// ── Sale CRUD ────────────────────────────────────────────────────────────
function saveSale(){
  const f=S.sF;
  const prod=S.products.find(p=>p.id===f.productId);
  if(!prod||!f.qty||+f.qty<=0){showToast('⚠️ ዕቃ እና ብዛት ምረጡ');return;}
  const discPct=Math.min(Math.max(+(f.discount||0),0),100);
  let ss,ps;
  if(S.editS){
    const old=S.sales.find(s=>s.id===S.editS);
    ps=S.products.map(p=>{
      if(p.id===old.productId) return {...p,quantity:p.quantity+old.qty};
      return p;
    });
    const newProd=ps.find(p=>p.id===f.productId);
    if(+f.qty>newProd.quantity){showToast('⚠️ ያለው ክምችት: '+newProd.quantity+' '+newProd.unit);return;}
    const effPrice=newProd.sellPrice*(1-discPct/100);
    const total=+f.qty*effPrice;
    ss=S.sales.map(s=>s.id===S.editS?{...s,productId:newProd.id,productName:newProd.name,qty:+f.qty,price:effPrice,originalPrice:newProd.sellPrice,discount:discPct,total,date:f.date}:s);
    ps=ps.map(p=>p.id===f.productId?{...p,quantity:p.quantity-+f.qty}:p);
  } else {
    if(+f.qty>prod.quantity){showToast('⚠️ ያለው ክምችት: '+prod.quantity+' '+prod.unit);return;}
    const effPrice=prod.sellPrice*(1-discPct/100);
    const total=+f.qty*effPrice;
    ss=[...S.sales,{id:uid(),productId:prod.id,productName:prod.name,qty:+f.qty,price:effPrice,originalPrice:prod.sellPrice,discount:discPct,total,date:f.date}];
    ps=S.products.map(p=>p.id===prod.id?{...p,quantity:p.quantity-+f.qty}:p);
  }
  saveData(S.user,ps,ss,S.trash,S.usageNotes);
  set({sales:ss,products:ps,showSForm:false,editS:null,sF:{productId:'',qty:'',date:today(),discount:''}});
  showToast('✅ ሽያጭ ተቀምጧል');
}
function delSale(id){
  const s=S.sales.find(x=>x.id===id);
  if(!s) return;
  const ps=S.products.map(p=>p.id===s.productId?{...p,quantity:p.quantity+s.qty}:p);
  const ss=S.sales.filter(x=>x.id!==id);
  saveData(S.user,ps,ss,S.trash,S.usageNotes);
  set({sales:ss,products:ps,confDelSale:null});
  showToast('🗑️ ሽያጭ ተሰርዟል — ክምችት ተመልሷል');
}

// ── Derived ──────────────────────────────────────────────────────────────
function D(){
  const p=S.products,s=S.sales;
  const inv=p.reduce((a,x)=>a+x.quantity*x.buyPrice,0);
  const rev=s.reduce((a,x)=>a+x.total,0);
  const prof=s.reduce((a,x)=>{const pr=p.find(r=>r.id===x.productId);return a+(pr?(x.price-pr.buyPrice)*x.qty:0);},0);
  const low=p.filter(x=>x.quantity<=10);
  const expAlert=p.filter(x=>{const es=expStatus(x.expDate);return es&&(es.status==='expired'||es.status==='soon');});
  return{inv,rev,prof,low,expAlert};
}

  var f=S.sF;
  var pr=S.products.find(function(p){return p.id===f.productId;});
  var html='<div class="mbg" id="smb"><div class="mod">';
  html+='<div class="mt">'+(S.editS?'✏️ ሽያጭ አስተካክል':'💰 ሽያጭ ምዝገባ')+'</div>';
  html+='<div class="lbl">ዕቃ ምረጥ</div><select class="inp" id="sp">';
  html+='<option value="">-- ዕቃ ምረጥ --</option>';
  CATS.forEach(function(c){
    var ps=S.products.filter(function(p){return p.category===c.id;});
    if(ps.length>0){
      html+='<optgroup label="'+c.icon+' '+c.name+'">';
      ps.forEach(function(p){html+='<option value="'+p.id+'"'+(f.productId===p.id?' selected':'')+'>'+p.name+' ('+p.quantity+' '+p.unit+') — '+ETB(p.sellPrice)+'</option>';});
      html+='</optgroup>';
    }
  });
  html+='</select>';
  html+='<div class="lbl">ብዛት</div><input class="inp" id="sq" type="number" placeholder="0" value="'+(f.qty||'')+'"/>';
  html+='<div class="lbl">📅 ቀን</div><input class="inp" id="sd" type="date" value="'+f.date+'"/>';
  html+='<div class="lbl">🏷️ ቅናሽ % (አማራጭ)</div><input class="inp" id="sdis" type="number" placeholder="0" min="0" max="100" value="'+(f.discount||'')+'"/>';
  var discPct=+(f.discount||0);
  var basePrice=pr?pr.sellPrice:0;
  var effPrice=basePrice*(1-discPct/100);
  if(pr&&f.qty&&+f.qty>0){
    var tot=effPrice*+f.qty;
    html+='<div class="tp">💰 ዋጋ: <strong>'+ETB(effPrice)+'</strong>'+(discPct>0?' <span style="text-decoration:line-through;color:#9CA3AF;font-size:11px">'+ETB(basePrice)+'</span> <span class="disc-badge">-'+discPct+'%</span>':'')+'<br>ጠቅላላ: <strong class="price-final">'+ETB(tot)+'</strong></div>';
  }
  html+='<div class="ma"><button class="btn g" id="sc2" style="flex:1">ሰርዝ</button><button class="btn p" id="ss2" style="flex:2">💾 '+(S.editS?'አዘምን':'ምዝገብ')+'</button></div>';
  html+='</div></div>';
  return html;
}

// ── Usage Notes Tab ──────────────────────────────────────────────────────
function rUsage(){
  var html='<div style="font-size:15px;font-weight:800;margin-bottom:4px">💊 አጠቃቀም ማስታወሻ</div>';
  html+='<div style="font-size:12px;color:#6B7280;margin-bottom:14px">ለእያንዳንዱ ዕቃ አጠቃቀም፣ መጠን፣ ጥንቃቄ ጻፍ</div>';
  if(S.products.length===0){html+='<div class="empty">ዕቃ አልተመዘገበም</div>';return html;}
  S.products.forEach(function(p){
    var cat=getCat(p.category);
    var note=S.usageNotes[p.id]||'';
    html+='<div class="usage-card">';
    html+='<div class="usage-header">';
    html+='<div><div class="usage-name">'+cat.icon+' '+p.name+'</div><div class="usage-cat">'+cat.name+' · '+ETB(p.sellPrice)+'</div></div>';
    html+='<button class="btn p" style="font-size:11px;padding:5px 10px" data-edit-usage="'+p.id+'">✏️ ጻፍ</button>';
    html+='</div>';
    if(note){html+='<div class="usage-text">'+note+'</div>';}
    else{html+='<div class="usage-empty">ማስታወሻ ገና አልተጻፈም...</div>';}
    html+='</div>';
  });
  return html;
}

    '<div class="mt">✏️ አጠቃቀም — '+p.name+'</div>'+

    '<textarea id="usage-ta" class="inp" rows="6" placeholder="ለምሳሌ:\n- አጠቃቀም: 2ml/ሊ ውሃ\n- መርጨት: ከሰብሉ 30 ቀን በፊት\n- ጥንቃቄ: ጓንት ያጥለቁ" style="resize:vertical">'+note+'</textarea>'+
    '<div class="ma"><button class="btn g" id="ue-cancel" style="flex:1">ሰርዝ</button><button class="btn p" id="ue-save" style="flex:2" data-pid="'+productId+'">💾 አስቀምጥ</button></div>'+
    '</div></div>';
}

// ── Bind ──────────────────────────────────────────────────────────────────
function bindLogin(){
  document.getElementById('li').addEventListener('input',function(e){S.loginVal=e.target.value;S.loginErr='';});
  document.getElementById('li').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
  document.getElementById('lb').addEventListener('click',login);
}
function bindMain(){
  document.getElementById('ob')?.addEventListener('click',logout);
  document.querySelectorAll('[data-tab]').forEach(function(b){b.addEventListener('click',function(){set({tab:b.dataset.tab,selCat:null});});});
  // cat
  document.querySelectorAll('[data-cat]').forEach(function(b){b.addEventListener('click',function(){set({selCat:b.dataset.cat,pSearch:'',showPForm:false});});});
  document.getElementById('back-cat')?.addEventListener('click',function(){set({selCat:null,pSearch:''});});
  // inv
  document.getElementById('ap-btn')?.addEventListener('click',function(){set({showPForm:true,editP:null,pF:{name:'',category:S.selCat||'arem',quantity:'',buyPrice:'',sellPrice:'',unit:'ሊ',expDate:''}});});
  document.getElementById('ps')?.addEventListener('input',function(e){set({pSearch:e.target.value});});
  document.querySelectorAll('[data-edit]').forEach(function(b){b.addEventListener('click',function(){var p=S.products.find(function(x){return x.id===b.dataset.edit;});if(p)set({showPForm:true,editP:p,pF:{name:p.name,category:p.category,quantity:p.quantity,buyPrice:p.buyPrice,sellPrice:p.sellPrice,unit:p.unit,expDate:p.expDate||''}});});});
  document.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){var p=S.products.find(function(x){return x.id===b.dataset.del;});if(p)set({confDel:p});});});
  // prod form
  document.querySelectorAll('.pfi').forEach(function(i){i.addEventListener('input',function(e){S.pF[e.target.dataset.k]=e.target.value;});});
  document.getElementById('pc')?.addEventListener('click',function(){set({showPForm:false});});
  document.getElementById('ps2')?.addEventListener('click',saveProd);
  document.getElementById('pmb')?.addEventListener('click',function(e){if(e.target.id==='pmb')set({showPForm:false});});
  // sales
  document.getElementById('as-btn')?.addEventListener('click',function(){set({showSForm:true,editS:null,sF:{productId:'',qty:'',date:today(),discount:''}});});
  document.getElementById('ss')?.addEventListener('input',function(e){set({sSearch:e.target.value});});
  // sale edit/delete
  document.querySelectorAll('[data-edit-sale]').forEach(function(b){b.addEventListener('click',function(){
    var s=S.sales.find(function(x){return x.id===b.dataset.editSale;});
    if(s)set({showSForm:true,editS:s.id,sF:{productId:s.productId,qty:s.qty,date:s.date,discount:s.discount||''}});
  });});
  document.querySelectorAll('[data-del-sale]').forEach(function(b){b.addEventListener('click',function(){
    var s=S.sales.find(function(x){return x.id===b.dataset.delSale;});
    if(s)set({confDelSale:s});
  });});
  // sale form
  document.getElementById('sp')?.addEventListener('change',function(e){S.sF.productId=e.target.value;render();});
  document.getElementById('sq')?.addEventListener('input',function(e){S.sF.qty=e.target.value;render();});
  document.getElementById('sd')?.addEventListener('input',function(e){S.sF.date=e.target.value;});
  document.getElementById('sdis')?.addEventListener('input',function(e){S.sF.discount=e.target.value;render();});
  document.getElementById('sc2')?.addEventListener('click',function(){set({showSForm:false,editS:null});});
  document.getElementById('ss2')?.addEventListener('click',saveSale);
  document.getElementById('smb')?.addEventListener('click',function(e){if(e.target.id==='smb')set({showSForm:false,editS:null});});
  // confirm del prod
  document.getElementById('cc')?.addEventListener('click',function(){set({confDel:null});});
  document.getElementById('co')?.addEventListener('click',function(){delProd(S.confDel.id);});
  document.getElementById('cb')?.addEventListener('click',function(e){if(e.target.id==='cb')set({confDel:null});});
  // confirm del sale
  document.getElementById('csc')?.addEventListener('click',function(){set({confDelSale:null});});
  document.getElementById('cso')?.addEventListener('click',function(){delSale(S.confDelSale.id);});
  document.getElementById('csb')?.addEventListener('click',function(e){if(e.target.id==='csb')set({confDelSale:null});});
  // trash
  document.querySelectorAll('[data-restore]').forEach(function(b){b.addEventListener('click',function(){restoreProd(b.dataset.restore);});});
  document.querySelectorAll('[data-perm]').forEach(function(b){b.addEventListener('click',function(){permDel(b.dataset.perm);});});
  // usage notes
  document.querySelectorAll('[data-edit-usage]').forEach(function(b){b.addEventListener('click',function(){set({editUsageId:b.dataset.editUsage});});});
  document.getElementById('ue-cancel')?.addEventListener('click',function(){set({editUsageId:null});});
  document.getElementById('ue-save')?.addEventListener('click',function(){
    var pid=document.getElementById('ue-save').dataset.pid;
    var note=document.getElementById('usage-ta').value;
    saveUsageNote(pid,note);
    set({editUsageId:null});
  });
  document.getElementById('uemb')?.addEventListener('click',function(e){if(e.target.id==='uemb')set({editUsageId:null});});
  // photo search
  document.getElementById('photo-search-btn')?.addEventListener('click',function(){set({showCam:true,camResult:null});});
  document.getElementById('cam-close')?.addEventListener('click',function(){set({showCam:false,camResult:null});});
  document.getElementById('cam-bg')?.addEventListener('click',function(e){if(e.target.id==='cam-bg')set({showCam:false,camResult:null});});
  document.getElementById('cam-take')?.addEventListener('click',function(){
    var fi=document.getElementById('cam-file');
    fi.setAttribute('capture','environment');
    fi.click();
  });
  document.getElementById('cam-gallery')?.addEventListener('click',function(){
    var fi=document.getElementById('cam-file');
    fi.removeAttribute('capture');
    fi.click();
  });
  document.getElementById('cam-file')?.addEventListener('change',function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=document.getElementById('cam-preview');
      if(img){img.src=ev.target.result;img.style.display='block';}
      set({camSearching:true});
      // Use AI to identify product from image
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:300,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:file.type,data:ev.target.result.split(',')[1]}},
            {type:'text',text:'This is a photo of an agricultural product, chemical, fertilizer, seed, or farm supply item. Identify the product name in 1-3 words only (in Amharic or English). Reply with ONLY the product name, nothing else.'}
          ]}]
        })
      }).then(function(r){return r.json();}).then(function(data){
        var name=data.content&&data.content[0]?data.content[0].text.trim():'';
        set({camSearching:false,showCam:false,camResult:name,selCat:null,pSearch:name,tab:'inv'});
      }).catch(function(){
        set({camSearching:false,showCam:false});
        showToast('⚠️ ፎቶ ፍለጋ አልተሳካም');
      });
    };
    reader.readAsDataURL(file);
  });
}

</script>
